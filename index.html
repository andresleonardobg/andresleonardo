<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/style.css">

    <!-- Vuex -->

    <title>Andres Leonardo</title>
</head>
<body>

    <div id="app">
        <sidebar></sidebar>
    </div>
    
    <!-- componentes -->
    <script src="./src/main.js"></script>
    <script src="./src/components/social.js"></script>
    <script src="./src/components/info.js"></script>
    <script src="./src/components/card.js"></script>
    <script src="./src/components/about.js"></script>
    <script src="./src/components/projects.js"></script>

    <script>

        const store = new Vuex.Store({
        state: {
            count: 1,
            project: 'servoArm'
        },
        mutations: {
            increment(state, page) {
            state.count = page.amount
            }
        }
        })

        new Vue({
            el: '#app',
            store
        })
    </script>
